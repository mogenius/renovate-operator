name: Helm

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: mogenius/github-actions/.github/workflows/helm-lint.yml@dc4fb8d8d4fc422a389de3fa5c1e44cc2900f5a4 # v1.4.1
    with:
      path: ./charts/renovate-operator

  tests:
    uses: mogenius/github-actions/.github/workflows/helm-unittest.yml@dc4fb8d8d4fc422a389de3fa5c1e44cc2900f5a4 # v1.4.1
    with:
      path: ./charts/renovate-operator


  template:
    uses: mogenius/github-actions/.github/workflows/helm-template.yml@dc4fb8d8d4fc422a389de3fa5c1e44cc2900f5a4 # v1.4.1
    with:
      path: ./charts/renovate-operator
      namespace: renovate-operator
      update_dependencies: true
      values: |
        metrics:
          dashboard:
            enabled: true
