name: Helm lint

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: arc-runner-set-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
        
      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Run Helm lint
        run: helm lint ./charts/renovate-operator

      - name: Run Helm template
        run: helm template --set=metrics.dashboard.enabled=true ./charts/renovate-operator
