name: Helm

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: mogenius/github-actions/.github/workflows/helm-lint.yml@f00ad2379dd065292d37bf4a7e9b84ebd31c584f # v1.1.1
    with:
      path: ./charts/renovate-operator

  tests:
    uses: mogenius/github-actions/.github/workflows/helm-unittest.yml@f00ad2379dd065292d37bf4a7e9b84ebd31c584f # v1.1.1
    with:
      path: ./charts/renovate-operator


  template:
    uses: mogenius/github-actions/.github/workflows/helm-template.yml@f00ad2379dd065292d37bf4a7e9b84ebd31c584f # v1.1.1
    with:
      path: ./charts/renovate-operator
      namespace: renovate-operator
      update_dependencies: true
      values: |
        metrics:
          dashboard:
            enabled: true
