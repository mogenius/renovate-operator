name: Helm

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: mogenius/github-actions/.github/workflows/helm-lint.yml@9bbef6f2531206a2cc3e41b0649704a80f2d4185 # v1.7.0
    with:
      path: ./charts/renovate-operator

  tests:
    uses: mogenius/github-actions/.github/workflows/helm-unittest.yml@9bbef6f2531206a2cc3e41b0649704a80f2d4185 # v1.7.0
    with:
      path: ./charts/renovate-operator


  template:
    uses: mogenius/github-actions/.github/workflows/helm-template.yml@9bbef6f2531206a2cc3e41b0649704a80f2d4185 # v1.7.0
    with:
      path: ./charts/renovate-operator
      namespace: renovate-operator
      update_dependencies: true
      values: |
        metrics:
          dashboard:
            enabled: true
