name: Helm

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: mogenius/github-actions/.github/workflows/helm-lint.yml@a99f0de23847f58298adc88fc22a04dd5a5aa2d0 # v1.3.0
    with:
      path: ./charts/renovate-operator

  tests:
    uses: mogenius/github-actions/.github/workflows/helm-unittest.yml@a99f0de23847f58298adc88fc22a04dd5a5aa2d0 # v1.3.0
    with:
      path: ./charts/renovate-operator


  template:
    uses: mogenius/github-actions/.github/workflows/helm-template.yml@a99f0de23847f58298adc88fc22a04dd5a5aa2d0 # v1.3.0
    with:
      path: ./charts/renovate-operator
      namespace: renovate-operator
      update_dependencies: true
      values: |
        metrics:
          dashboard:
            enabled: true
