name: Helm

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    uses: mogenius/github-actions/.github/workflows/helm-lint.yml@2dd56b0d0223d0c7fd80d9f978186d02cb0546dd # v1.2.0
    with:
      path: ./charts/renovate-operator

  tests:
    uses: mogenius/github-actions/.github/workflows/helm-unittest.yml@2dd56b0d0223d0c7fd80d9f978186d02cb0546dd # v1.2.0
    with:
      path: ./charts/renovate-operator


  template:
    uses: mogenius/github-actions/.github/workflows/helm-template.yml@2dd56b0d0223d0c7fd80d9f978186d02cb0546dd # v1.2.0
    with:
      path: ./charts/renovate-operator
      namespace: renovate-operator
      update_dependencies: true
      values: |
        metrics:
          dashboard:
            enabled: true
