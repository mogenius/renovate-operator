name: Build, Package, Release (Production)

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

env:
  REGISTRY: ghcr.io
  DOCKERFILE: Dockerfile
  HELMNAME: "renovate-operator"

jobs:
  build-operator:
    uses: mogenius/github-actions/.github/workflows/build-multiarch.yml@9ceb2494cc853e1750a3403f37ea8d5ea19ab72b # v1.4.3
    secrets: inherit
    with:
      version: ${{ github.ref_name }}
      image: ghcr.io/mogenius/renovate-operator
      push_latest: true
      sign_image: true

  helm-chart:
    needs: [build-operator]
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_SECRET }}

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        id: install

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ">=1.23.2"

      - name: Run helm-docs
        uses: losisin/helm-docs-github-action@3a4528e97c49a5e83de6b78c50c61c8ee5c9f944 # v2.0.0
        with:
          chart-search-root: charts/renovate-operator

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Helm repositories
        run: |
          helm repo add valkey https://valkey.io/valkey-helm/
          helm repo update

      - name: package and push
        run: |
          VERSION=${{ github.ref_name }}

          sed -i "s/^version:.*/version: $VERSION/" charts/renovate-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: $VERSION/" charts/renovate-operator/Chart.yaml

          git add charts/renovate-operator/Chart.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            export GOPATH=$(go env GOPATH)
            export PATH=$PATH:$GOPATH/bin

            echo "Installing controller-gen"
            go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest

            echo "Generating CRDs"
            controller-gen crd paths=./src/... output:crd:dir=charts/renovate-operator/crd

            git add charts/renovate-operator/crd/*.mogenius.com_*.yaml

            echo "Building dependencies"
            helm dependency build ./charts/renovate-operator

            echo "Packaging Helm chart"
            helm package -d /tmp/ ./charts/renovate-operator

            echo "Pushing to Helm repository"
            curl -XPOST -L -k --data-binary "@/tmp/${{ env.HELMNAME }}-$VERSION.tgz" https://${{ secrets.MO_HELMUSER }}:${{ secrets.MO_HELMPASS }}@helm.mogenius.com/api/public/charts

            echo "Pushing to OCI registry"
            echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
            CHART_DIGEST=$(helm push /tmp/${{ env.HELMNAME }}-$VERSION.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts 2>&1 | grep "Digest: sha256:" | awk '{print $2}')

            if [ -z "$CHART_DIGEST" ]; then
              echo "Failed to extract chart digest"
              exit 1
            fi
            echo "Chart digest: $CHART_DIGEST"

            echo "Signing Helm chart with cosign"
            cosign sign --yes ghcr.io/${{ github.repository_owner }}/helm-charts/${{ env.HELMNAME }}@${CHART_DIGEST}

            git commit -m "chore: update Chart.yaml and documentation for version $VERSION [skip ci]"

            git pull --rebase
            git push origin main
          fi
