                                viewBox="0 0 20 20"
                              >
                                <path
                                  fillRule="evenodd"
                                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                                  clipRule="evenodd"
                                />
                              </svg>
                              {job.triggeringAll ? "Triggering..." : "Trigger All"}
                            </button>
                          </div>
                        </th>
                      </tr>
                    </thead>
                    <tbody className="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                      {job.projects && job.projects.length > 0 ? (
                        sortedProjects.map((project) => {
                          const ProjectRow = () => {
                            const { containerRef, tooltipProps, tooltipElement } = useTooltip(project);

                            return (
                              <>
                                <tr
                                  ref={containerRef}
                                  {...tooltipProps}
                                  className={`hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors ${project.renovateResultStatus && project.renovateResultStatus !== "done" ? "bg-amber-50/60 dark:bg-amber-900/10 shadow-[inset_4px_0_0_0_rgb(251_191_36)] dark:shadow-[inset_4px_0_0_0_rgb(245_158_11)]" : ""}`}
                                >
                                  <td className="px-6 py-4">
                              <div className="flex items-center gap-2 w-full justify-between">
                                <span className={`font-medium min-w-0 break-words ${project.renovateResultStatus && project.renovateResultStatus !== "done" ? "text-gray-500 dark:text-slate-400" : "text-gray-900 dark:text-slate-100"}`}>
                                  {project.name}
                                </span>
                                {project.renovateResultStatus && project.renovateResultStatus !== "done" && (
                                  <span className="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium whitespace-nowrap shrink-0 bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 ring-1 ring-amber-300 dark:ring-amber-700">
                                    {project.renovateResultStatus}
                                  </span>
                                )}
                              </div>
                            </td>
                            <td className="px-6 py-4">
                              <span className={getBadgeClass(project.status)}>
                                {project.status || "-"}
                              </span>
                            </td>
                            <td className="px-6 py-4" data-no-tooltip="true">
                              <PRActivityBadges
                                prActivity={project.prActivity}
                                expanded={expandedProjects.has(project.name)}
                                onToggle={() => toggleProjectExpanded(project.name)}
                                projectName={project.name}
                              />
                            </td>
                            <td className="px-6 py-4" data-no-tooltip="true">
                              <IssuesBadges
                                logIssues={project.logIssues}
                                expanded={expandedIssues.has(project.name)}
                                onToggle={() => toggleIssueExpanded(project.name)}
                                projectName={project.name}
                              />
                            </td>
                            <td className="px-6 py-4">
                              <span className="text-sm text-gray-600 dark:text-slate-300">
                                {project.lastRun
                                  ? formatTimeAgo(project.lastRun)
                                  : "Never"}
                              </span>
                            </td>
                            <td className="px-6 py-4" data-no-tooltip="true">
                              <div className="flex items-center gap-2">
                                {(() => {
                                  const dashboardUrl = buildDashboardUrl(job.platform, job.platformEndpoint, project.name);
                                  return dashboardUrl ? (
                                    <a
                                      href={dashboardUrl}
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      className="inline-flex items-center gap-1 text-sm text-primary hover:text-primary-hover font-medium"
                                      aria-label={`View Dependency Dashboard for ${project.name}`}
                                      title={`Dependency Dashboard for ${project.name}`}
                                    >
                                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                      </svg>
                                    </a>
                                  ) : null;
                                })()}
                                {(() => {
                                  const prUrl = buildPRUrl(job.platform, job.platformEndpoint, project.name);
                                  return prUrl ? (
                                    <a
                                      href={prUrl}
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      className="inline-flex items-center gap-1 text-sm text-primary hover:text-primary-hover font-medium"
                                      aria-label={`View open PRs/MRs for ${project.name}`}
                                      title={`Open PRs/MRs for ${project.name}`}
                                    >
                                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                      </svg>
                                    </a>
                                  ) : null;
                                })()}
                                {(() => {
                                  const prUrl = buildPRUrl(job.platform, job.platformEndpoint, project.name);
                                  const dashboardUrl = buildDashboardUrl(job.platform, job.platformEndpoint, project.name);
                                  return (!prUrl && !dashboardUrl) ? (
                                    <span className="text-gray-400 dark:text-slate-500 text-sm">-</span>
                                  ) : null;
                                })()}
                              </div>
                            </td>
                            <td className="px-6 py-4 text-right" data-no-tooltip="true">
                              <div className="flex items-center justify-end gap-2">
                                <ActionButton
                                  project={project}
                                  onTrigger={() => onTriggerRenovate(job, project)}
                                  onCancel={() => onCancelRenovate(job, project)}
                                  width="w-[100px]"
                                />
                                <a
                                  href={`/logs?renovate=${encodeURIComponent(
                                    job.name
                                  )}&namespace=${encodeURIComponent(
                                    job.namespace
                                  )}&project=${encodeURIComponent(
                                    project.name
                                  )}`}
                                  target="_blank"
                                  className="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1.5 rounded-lg font-semibold text-[0.813rem] shadow-sm hover:shadow-md transition-all inline-block min-w-[60px] text-center"
                                  aria-label={`View logs for ${project.name}`}
                                >
                                  Logs
                                </a>
                              </div>
                            </td>
                          </tr>
                          {expandedProjects.has(project.name) && project.prActivity && (
                            <PRDetailRow prActivity={project.prActivity} projectName={project.name} platform={job.platform} platformEndpoint={job.platformEndpoint} />
                          )}
                          {expandedIssues.has(project.name) && project.logIssues && (
                            <IssueDetailRow logIssues={project.logIssues} projectName={project.name} jobName={job.name} jobNamespace={job.namespace} />
                          )}
                          {tooltipElement}
                        </>
                      );
                    };

                    return <ProjectRow key={project.name} />;
                  })
                      ) : (
                        <tr>
                          <td
                            colSpan="7"
                            className="px-6 py-8 text-center text-gray-500 dark:text-slate-400"
                          >
                            No projects found. Run discovery to find projects.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>

                <div className="md:hidden bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">
                  {job.projects && job.projects.length > 0 ? (
                    sortedProjects.map((project) => {
                      const ProjectCard = () => {
                        const { containerRef, tooltipProps, tooltipElement } = useTooltip(project);

                        return (
                          <>
                            <div
                              ref={containerRef}
                              {...tooltipProps}
                              className={`p-4 space-y-3 ${project.renovateResultStatus && project.renovateResultStatus !== "done" ? "bg-amber-50/60 dark:bg-amber-900/10 border-l-4 border-amber-400 dark:border-amber-500" : ""}`}
                            >
                          <div className="flex items-start justify-between">
                          <div>
                            <div className="flex items-center gap-2 flex-wrap">
                              <p className={`font-medium ${project.renovateResultStatus && project.renovateResultStatus !== "done" ? "text-gray-500 dark:text-slate-400" : "text-gray-900 dark:text-slate-100"}`}>
                                {project.name}
                              </p>
                              {project.renovateResultStatus && project.renovateResultStatus !== "done" && (
                                <span className="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium whitespace-nowrap shrink-0 bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 ring-1 ring-amber-300 dark:ring-amber-700">
                                  {project.renovateResultStatus}
                                </span>
                              )}
                            </div>
                            <p className="text-xs text-gray-500 dark:text-slate-400 mt-1">
                              Last run:{" "}
                              {project.lastRun
                                ? formatTimeAgo(project.lastRun)
                                : "Never"}
                            </p>
                          </div>
                          <span
                            className={`ml-2 ${getBadgeClass(project.status)}`}
                          >
                            {project.status || "-"}
                          </span>
                        </div>
                        {/* PR Activity section */}
                        <div className="flex items-center gap-2" data-no-tooltip="true">
                          <span className="text-xs text-gray-500 dark:text-slate-400 font-medium">Activity:</span>
                          <PRActivityBadges
                            prActivity={project.prActivity}
                            expanded={expandedProjects.has(project.name)}
                            onToggle={() => toggleProjectExpanded(project.name)}
                            projectName={project.name}
                          />
                        </div>
                        {expandedProjects.has(project.name) && project.prActivity && project.prActivity.prs && project.prActivity.prs.length > 0 && (
                          <div id={`pr-details-${safeId(project.name)}`} className="pl-2 border-l-2 border-gray-200 dark:border-slate-600 max-h-48 overflow-y-auto">
                            <div className="space-y-1.5">
                              {project.prActivity.prs.map((pr, idx) => {
                                const actionClass = prActionBadgeClass(pr.action);
                                const prUrl = buildSinglePRUrl(job.platform, job.platformEndpoint, project.name, pr.number);
                                return (
                                  <div key={idx} className="flex items-center gap-2 text-sm">
                                    <span className={actionClass}>{pr.action}</span>
                                    {prUrl ? (
                                      <a href={prUrl} target="_blank" rel="noopener noreferrer" className="text-primary hover:text-primary-hover hover:underline truncate text-xs" title={pr.title || prUrl}>
                                        {pr.title || prUrl}
                                      </a>
                                    ) : (
                                      <span className="text-gray-700 dark:text-slate-300 truncate text-xs" title={pr.title}>{pr.title || "Untitled PR"}</span>
                                    )}
                                    {pr.number && prUrl && <a href={prUrl} target="_blank" rel="noopener noreferrer" className="text-gray-400 dark:text-slate-500 hover:text-primary hover:dark:text-primary-hover text-xs flex-shrink-0">#{pr.number}</a>}
                                    {pr.number && !prUrl && <span className="text-gray-400 dark:text-slate-500 text-xs flex-shrink-0">#{pr.number}</span>}
                                  </div>
                                );
                              })}
                              {project.prActivity.truncated && (
                                <div className="text-xs text-gray-400 dark:text-slate-500 italic mt-1">Some PRs omitted (list truncated)</div>
                              )}
                            </div>
                          </div>
                        )}
                        {/* Issues section */}
                        <div className="flex items-center gap-2" data-no-tooltip="true">
                          <span className="text-xs text-gray-500 dark:text-slate-400 font-medium">Issues:</span>
                          <IssuesBadges
                            logIssues={project.logIssues}
                            expanded={expandedIssues.has(project.name)}
                            onToggle={() => toggleIssueExpanded(project.name)}
                            projectName={project.name}
                          />
                        </div>
                        {expandedIssues.has(project.name) && project.logIssues && project.logIssues.issues && project.logIssues.issues.length > 0 && (
                          <div id={`issue-details-${safeId(project.name)}`} className="pl-2 border-l-2 border-amber-300 dark:border-amber-600 max-h-48 overflow-y-auto">
                            <div className="space-y-1.5">
                              {project.logIssues.issues.map((issue, idx) => (
                                <a
                                  key={idx}
                                  href={issueLogsHref(job.name, job.namespace, project.name, issue.level)}
                                  target="_blank"
                                  rel="noopener"
                                  className="group flex items-start gap-2 text-sm rounded-md hover:bg-amber-50 dark:hover:bg-amber-900/20 -mx-1 px-1 py-0.5 transition-colors"
                                  title="Open full message in logs"
                                >
                                  <span className={`flex-shrink-0 ${issueLevelBadgeClass(issue.level)}`}>{issue.level >= 50 ? "error" : "warn"}</span>
                                  <span className="text-gray-700 dark:text-slate-300 break-all text-xs">
                                    {displayIssueMessage(issue.message)}
                                    <span className="inline-flex items-center gap-0.5 ml-1.5 text-primary hover:underline whitespace-nowrap">
                                      View in logs
                                      <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                      </svg>
                                    </span>
                                  </span>
                                </a>
                              ))}
                              {project.logIssues.truncated && (
                                <div className="text-xs text-gray-400 dark:text-slate-500 italic mt-1">Some issues omitted (list truncated)</div>
                              )}
                            </div>
                          </div>
                        )}
                        <div className="flex gap-2 flex-wrap" data-no-tooltip="true">
                          <ActionButton
                            project={project}
                            onTrigger={() => onTriggerRenovate(job, project)}
                            onCancel={() => onCancelRenovate(job, project)}
                            width="w-[110px]"
                          />
                          <a
                            href={`/logs?renovate=${encodeURIComponent(
                              job.name
                            )}&namespace=${encodeURIComponent(
                              job.namespace
                            )}&project=${encodeURIComponent(project.name)}`}
                            target="_blank"
                            className="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1.5 rounded-lg font-semibold text-[0.813rem] shadow-sm hover:shadow-md transition-all inline-block w-[70px] text-center"
                            aria-label={`View logs for ${project.name}`}
                          >
                            Logs
                          </a>
                          {(() => {
                            const dashboardUrl = buildDashboardUrl(job.platform, job.platformEndpoint, project.name);
                            return dashboardUrl ? (
                              <a
                                href={dashboardUrl}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="inline-flex items-center gap-1 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 text-gray-700 dark:text-slate-200 px-3 py-1.5 rounded-lg font-semibold text-[0.813rem] shadow-sm hover:shadow-md transition-all"
                                aria-label={`View Dependency Dashboard for ${project.name}`}
                                title={`Dependency Dashboard for ${project.name}`}
                              >
                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                </svg>
                              </a>
                            ) : null;
                          })()}
                          {(() => {
                            const prUrl = buildPRUrl(job.platform, job.platformEndpoint, project.name);
                            return prUrl ? (
                              <a
                                href={prUrl}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="inline-flex items-center gap-1 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 text-gray-700 dark:text-slate-200 px-3 py-1.5 rounded-lg font-semibold text-[0.813rem] shadow-sm hover:shadow-md transition-all"
                                aria-label={`View open PRs/MRs for ${project.name}`}
                                title={`Open PRs/MRs for ${project.name}`}
                              >
                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                              </a>
                            ) : null;
                          })()}
                        </div>
                      </div>
                      {tooltipElement}
                    </>
                  );
                };

                return <ProjectCard key={project.name} />;
              })
                  ) : (
                    <div className="p-8 text-center text-gray-500 dark:text-slate-400">
                      No projects found. Run discovery to find projects.
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
