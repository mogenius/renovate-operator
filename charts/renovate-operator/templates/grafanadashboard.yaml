{{- if and .Values.metrics.dashboard.enabled (.Capabilities.APIVersions.Has "grafana.integreatly.org/v1beta1/GrafanaDashboard") }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: renovate-operator-dashboard
  namespace: {{ .Values.metrics.dashboard.namespace | default .Release.Namespace }}
spec:
  {{- toYaml (omit .Values.metrics.dashboard.grafanaDashboard "instanceSelector") | nindent 2 }}
  instanceSelector:
    {{- with omit (default (dict) .Values.metrics.dashboard.grafanaDashboard.instanceSelector) "matchLabels" }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    matchLabels:
      {{- if .Values.metrics.dashboard.grafanaDashboard.instanceSelector.matchLabels }}
      {{- toYaml .Values.metrics.dashboard.grafanaDashboard.instanceSelector.matchLabels | nindent 6 }}
      {{- else }}
      grafana.internal/instance: "grafana"
      {{- end }}
  configMapRef:
    name: renovate-operator-dashboard
    key: renovate-operator.json
{{- end }}
