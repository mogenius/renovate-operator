{{- if .Values.metrics.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  {{- with .Values.metrics.dashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.metrics.dashboard.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: renovate-operator-dashboard
  namespace: {{ .Values.metrics.dashboard.namespace | default .Release.Namespace  }}
data:
  renovate-operator.json: |

    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": 0 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 0, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "showPercentChange": false, "textMode": "auto", "wideLayout": true
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "editorMode": "code", "exemplar": false,
              "expr": "count(group by(project) (renovate_operator_project_executions_total{renovate_namespace=~\"$RenovateNamespace\", renovate_job=~\"$RenovateJob\"}))",
              "instant": false, "legendFormat": "__auto", "range": true, "refId": "A"
            }
          ],
          "title": "Repositories",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": 0 }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 3, "y": 1 },
          "id": 110,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "showPercentChange": false, "textMode": "auto", "wideLayout": true
