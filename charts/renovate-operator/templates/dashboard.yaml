          "pluginVersion": "12.3.1",
          "targets": [
            {
              "editorMode": "code", "exemplar": false,
              "expr": "sum(renovate_operator_projects_running{renovate_namespace=~\"$RenovateNamespace\", renovate_job=~\"$RenovateJob\"})",
