              "legendFormat": "p50", "range": true, "refId": "A"
            },
            {
              "editorMode": "code", "exemplar": false,
              "expr": "histogram_quantile(0.95, sum by(le) (rate(renovate_operator_project_queue_wait_seconds_bucket{renovate_namespace=~\"$RenovateNamespace\", renovate_job=~\"$RenovateJob\"}[$__rate_interval])))",
              "legendFormat": "p95", "range": true, "refId": "B"
