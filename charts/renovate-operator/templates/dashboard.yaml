          "title": "Running",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": 0 }, { "color": "yellow", "value": 20 }, { "color": "orange", "value": 100 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 6, "y": 1 },
          "id": 111,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
