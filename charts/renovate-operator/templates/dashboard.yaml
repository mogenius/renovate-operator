          "id": 112,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "showPercentChange": false, "textMode": "auto", "wideLayout": true
          },
