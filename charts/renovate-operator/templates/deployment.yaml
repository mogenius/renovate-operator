apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "renovate-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.deployment.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: {{ include "renovate-operator.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "renovate-operator.fullname" . }}
        {{- with .Values.deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.deployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "renovate-operator.serviceAccountName" . }}
      {{- with .Values.securityContext.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: renovate-operator
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--zap-log-level={{ .Values.logging.level }}"
            - "--zap-encoder={{ .Values.logging.format }}"
          {{- with .Values.securityContext.container }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JOB_TIMEOUT_SECONDS
              value: {{ .Values.config.defaultJobActiveDeadlineSeconds | quote }}
            - name: JOB_BACKOFF_LIMIT
              value: {{ .Values.config.defaultJobBackoffLimit | quote }}
            - name: DELETE_SUCCESSFUL_JOBS
              value: {{ .Values.config.deleteSuccessfulJobs | quote }}
            - name: JOB_TTL_SECONDS_AFTER_FINISHED
              value: {{ .Values.config.jobTTLSecondsAfterFinished | quote }}
            - name: IMAGE_PULL_SECRETS
              value: {{ .Values.image.imagePullSecrets | toJson | quote }}
            - name: SERVER_PORT
              value: "8081"
            {{- if or .Values.rbac.ownNamespaceOnly .Values.rbac.watchNamespace }}
            - name: WATCH_NAMESPACE
              {{- if .Values.rbac.watchNamespace }}
              value: {{ .Values.rbac.watchNamespace | quote }}
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
              {{- end }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: WEBHOOK_SERVER_PORT
              value: {{ .Values.webhook.port | quote }}
            - name: WEBHOOK_SERVER_ENABLED
              value: "true"
            {{- end }}
            {{- if gt (int .Values.replicaCount) 1 }}
            - name: LEADER_ELECTION_ID
              value: "{{ include "renovate-operator.fullname" . }}-leader"
            {{- end }}
            {{- if .Values.auth.oidc.enabled }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.auth.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.existingSecret }}
                  key: {{ .Values.auth.oidc.secretKey | default "client-secret" }}
            {{- if .Values.auth.oidc.sessionSecretKey }}
            - name: OIDC_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.existingSecret }}
                  key: {{ .Values.auth.oidc.sessionSecretKey }}
            {{- end }}
            {{- $oidcRedirectUrl := include "renovate-operator.authRedirectUrl" (dict "redirectUrl" .Values.auth.oidc.redirectUrl "Values" .Values) }}
            {{- if $oidcRedirectUrl }}
            - name: OIDC_REDIRECT_URL
              value: {{ $oidcRedirectUrl | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.insecureSkipVerify }}
            - name: OIDC_INSECURE_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- if .Values.auth.oidc.logoutUrl }}
            - name: OIDC_LOGOUT_URL
              value: {{ .Values.auth.oidc.logoutUrl | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.allowedGroupPrefix }}
            - name: OIDC_ALLOWED_GROUP_PREFIX
              value: {{ .Values.auth.oidc.allowedGroupPrefix | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.allowedGroupPattern }}
            - name: OIDC_ALLOWED_GROUP_PATTERN
              value: {{ .Values.auth.oidc.allowedGroupPattern | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.additionalScopes }}
            - name: OIDC_ADDITIONAL_SCOPES
              value: {{ .Values.auth.oidc.additionalScopes | join "," | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.fetchUserInfoGroups }}
            - name: OIDC_FETCH_USERINFO_GROUPS
              value: "true"
            {{- end }}
            {{- else if .Values.auth.github.enabled }}
            - name: GITHUB_CLIENT_ID
              value: {{ .Values.auth.github.clientId | quote }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.github.existingSecret }}
                  key: {{ .Values.auth.github.secretKey | default "client-secret" }}
            {{- if .Values.auth.github.sessionSecretKey }}
            - name: GITHUB_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.github.existingSecret }}
                  key: {{ .Values.auth.github.sessionSecretKey }}
            {{- end }}
            {{- $githubRedirectUrl := include "renovate-operator.authRedirectUrl" (dict "redirectUrl" .Values.auth.github.redirectUrl "Values" .Values) }}
            {{- if $githubRedirectUrl }}
            - name: GITHUB_REDIRECT_URL
              value: {{ $githubRedirectUrl | quote }}
            {{- end }}
            {{- end }}
            {{- if or .Values.auth.oidc.enabled .Values.auth.github.enabled }}
            {{- if .Values.auth.sessionStoreRedisExistingSecret }}
            - name: SESSION_STORE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.sessionStoreRedisExistingSecret }}
                  key: {{ .Values.auth.sessionStoreRedisSecretKey | default "redis-url" }}
            {{- else if .Values.auth.sessionStoreRedisUrl }}
            - name: SESSION_STORE_REDIS_URL
              value: {{ .Values.auth.sessionStoreRedisUrl | quote }}
            {{- else if .Values.redis.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "renovate-operator.fullname" . }}-redis
                  key: redis-password
            - name: SESSION_STORE_REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ include "renovate-operator.fullname" . }}-redis-master:6379/0"
            {{- end }}
            {{- if .Values.auth.defaultAllowedGroups }}
            - name: DEFAULT_ALLOWED_GROUPS
              value: {{ .Values.auth.defaultAllowedGroups | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
            {{- if .Values.webhook.enabled }}
            - containerPort: {{ .Values.webhook.port }}
              name: webhook
              protocol: TCP
            {{- end }}
